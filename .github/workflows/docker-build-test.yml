name: Docker Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IMAGE_NAME: clip-deepfake
  REGISTRY: ghcr.io

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.6.0 torchvision==0.21.0 torchaudio==2.6.0

      - name: Run pytest
        run: |
          pytest tests -v --cov=. --cov-report=term-missing --cov-report=xml

  docker-smoke:
    name: Build CPU Image Smoke Test
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:smoke
          cache-from: type=gha,scope=cpu-smoke
          cache-to: type=gha,mode=max,scope=cpu-smoke

      - name: Run smoke container
        run: |
          mkdir -p input output logs models
          docker run -d --name clip-deepfake-smoke \
            -v $(pwd)/input:/data/input \
            -v $(pwd)/output:/data/output \
            -v $(pwd)/logs:/data/logs \
            -v $(pwd)/models:/data/models \
            -e FORCE_CPU=true \
            ${{ env.IMAGE_NAME }}:smoke
          sleep 8
          docker ps -q -f name=clip-deepfake-smoke
          docker logs clip-deepfake-smoke
          docker stop clip-deepfake-smoke
          docker rm clip-deepfake-smoke

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: docker-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: cpu
            dockerfile: Dockerfile
            suffix: ""
            platforms: linux/amd64
          - name: cuda
            dockerfile: Dockerfile.cuda
            suffix: "-cuda"
            platforms: linux/amd64
          - name: mps
            dockerfile: Dockerfile.mps
            suffix: "-mps"
            platforms: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest${{ matrix.variant.suffix }},enable={{is_default_branch}}
            type=ref,event=branch,suffix=${{ matrix.variant.suffix }}
            type=sha,prefix={{branch}}-,suffix=${{ matrix.variant.suffix }}

      - name: Build and push ${{ matrix.variant.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.variant.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
